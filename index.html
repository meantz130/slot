<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프리미엄 메뉴 슬롯 1.0</title>
    <style>
        :root {
            --accent: #FF3B30; 
            --gold: #FFD700;
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
            --secondary-text: #8E8E93;
            --neon-shadow: 0 0 15px rgba(255, 59, 48, 0.8), 0 0 30px rgba(255, 59, 48, 0.5);
            --gold-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .header {
            width: 100%; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center; box-sizing: border-box;
            border-bottom: 1px solid #333;
        }
        .app-title { font-weight: 900; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .version-badge { font-size: 12px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 20px; cursor: pointer; }

        .slot-machine {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 70%);
        }

        .slot-window {
            width: 85%; max-width: 340px; height: 140px;
            background: #000; border-radius: 24px;
            position: relative; overflow: hidden;
            border: 4px solid #333;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.8);
        }
        .slot-window.active {
            border-color: var(--accent);
            box-shadow: inset 0 0 20px rgba(255,59,48,0.2), var(--neon-shadow);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .reels { position: absolute; width: 100%; top: 0; left: 0; display: flex; flex-direction: column; }
        .reel-item {
            height: 140px; line-height: 140px; text-align: center;
            font-size: 36px; font-weight: 900; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .slot-window.active .reel-item { color: var(--accent); text-shadow: var(--neon-shadow); }

        .controls { margin: 30px 0; }
        .spin-btn {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(145deg, #ff453a, #b01c15);
            color: white; border: 4px solid #fff;
            font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,59,48,0.5);
            transition: all 0.1s;
        }
        .spin-btn:active { transform: scale(0.9) translateY(4px); }
        .spin-btn.disabled { background: #333; border-color: #555; color: #666; box-shadow: none; }

        .menu-sheet {
            width: 100%; height: 35%; background: var(--card);
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 20px 24px; box-sizing: border-box; display: flex; flex-direction: column;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group input {
            flex: 1; background: #2C2C2E; border: 1px solid #3a3a3c; border-radius: 12px;
            padding: 12px; color: white; font-size: 16px; outline: none;
        }
        .input-group button { background: #3A3A3C; color: var(--gold); border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; }

        .menu-list-container { flex: 1; overflow-y: auto; }
        .menu-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2C2C2E; }
        .menu-name { font-size: 17px; font-weight: 500; }
        .menu-prob { font-size: 13px; color: var(--secondary-text); margin-left: 8px; }
        .delete-icon { color: #FF453A; font-size: 20px; cursor: pointer; padding: 5px; }

        /* 모달 공통 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: linear-gradient(145deg, #2c2c2e, #1a1a1a);
            padding: 40px 20px; border-radius: 30px;
            text-align: center; width: 85%; max-width: 320px;
            border: 3px solid var(--gold); box-shadow: var(--gold-shadow);
            animation: modalPop 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes modalPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-header { color: var(--secondary-text); font-size: 16px; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; }
        .modal-result { 
            font-size: 48px; font-weight: 900; margin: 25px 0; 
            color: var(--gold); text-shadow: var(--gold-shadow);
            animation: textPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes textPulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .modal-close { 
            background: var(--gold); color: black; border: none; 
            padding: 14px 50px; border-radius: 15px; font-weight: 900; font-size: 18px;
        }

        /* 업데이트 내용 스타일 */
        .update-body { text-align: left; color: #ccc; font-size: 14px; line-height: 1.8; margin-bottom: 20px; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="app-title">LUCKY MENU</div>
        <div class="version-badge" onclick="openUpdateModal()">Ver 1.0</div>
    </div>

    <div class="slot-machine">
        <div id="slotWindow" class="slot-window">
            <div id="reels" class="reels"></div>
        </div>
        <div class="controls">
            <button id="spinBtn" class="spin-btn" onclick="handleSpin()">SPIN</button>
        </div>
    </div>

    <div class="menu-sheet">
        <div class="input-group">
            <input type="text" id="menuInput" placeholder="새 메뉴 추가..." maxlength="12">
            <button onclick="addMenu()">추가</button>
        </div>
        <div class="menu-list-container">
            <div id="menuList"></div>
        </div>
    </div>

    <div id="resultModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">TODAY'S LUNCH</div>
            <div id="winnerName" class="modal-result"></div>
            <button class="modal-close" onclick="closeModal()">확인</button>
        </div>
    </div>

    <div id="updateModal" class="modal" onclick="closeUpdateModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">UPDATE NOTES</div>
            <div class="update-body">
                • Ver 1.0 정식 버전 출시<br>
                • 프리미엄 블랙 & 네온 UI 적용<br>
                • 실제 슬롯머신 사운드 이펙트 추가<br>
                • 메뉴 추가 기능 및 자동 저장<br>
                • 부드러운 물리 감속 애니메이션
            </div>
            <button class="modal-close" onclick="closeUpdateModal()">닫기</button>
        </div>
    </div>

    <script>
        const MENU_KEY = 'MY_RANDOM_MENU_LIST_V1';
        let menus = JSON.parse(localStorage.getItem(MENU_KEY)) || ["치킨", "삼겹살", "파스타", "김밥", "국밥", "초밥", "햄버거"];
        const ITEM_HEIGHT = 140;
        let isRunning = false;

        // 🔊 개선된 오디오 시스템
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);

            if (type === 'tick') {
                const osc = audioCtx.createOscillator();
                osc.type = 'square'; // 더 기계적인 소리
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.05);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain);
                osc.start();
                osc.stop(now + 0.05);
            } else if (type === 'win') {
                // 화려한 3단 음 (팡파르)
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, now + (i * 0.1));
                    gain.gain.setValueAtTime(0.1, now + (i * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
                    osc.connect(gain);
                    osc.start(now + (i * 0.1));
                    osc.stop(now + (i * 0.1) + 0.3);
                });
            }
        }

        function init() { renderList(); renderReels(); }

        function renderList() {
            const listEl = document.getElementById('menuList');
            listEl.innerHTML = '';
            const prob = (menus.length > 0) ? (100 / menus.length).toFixed(1) : 0;
            menus.forEach((m, i) => {
                const item = document.createElement('div');
                item.className = 'menu-list-item';
                item.innerHTML = `<div><span class="menu-name">${m}</span><span class="menu-prob">${prob}%</span></div><span class="delete-icon" onclick="deleteMenu(${i})">✕</span>`;
                listEl.appendChild(item);
            });
            localStorage.setItem(MENU_KEY, JSON.stringify(menus));
        }

        function renderReels() {
            const reelsEl = document.getElementById('reels');
            reelsEl.innerHTML = '';
            const displayArr = [];
            for(let i=0; i<12; i++) displayArr.push(...menus);
            displayArr.forEach(m => {
                const div = document.createElement('div');
                div.className = 'reel-item';
                div.innerText = m;
                reelsEl.appendChild(div);
            });
            reelsEl.style.transition = 'none';
            reelsEl.style.transform = `translateY(0)`;
        }

        function handleSpin() {
            if (isRunning || menus.length < 2) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            isRunning = true;
            const btn = document.getElementById('spinBtn');
            const reelsEl = document.getElementById('reels');
            const slotWindow = document.getElementById('slotWindow');
            
            btn.classList.add('disabled');
            btn.innerText = '...';
            slotWindow.classList.add('active');

            reelsEl.style.transition = 'transform 0.15s linear';
            let loopCount = 0;
            const spinInterval = setInterval(() => {
                loopCount++;
                reelsEl.style.transform = `translateY(-${(loopCount % menus.length) * ITEM_HEIGHT}px)`;
                playSound('tick');
            }, 60);

            setTimeout(() => {
                clearInterval(spinInterval);
                const winnerIdx = Math.floor(Math.random() * menus.length);
                const winnerName = menus[winnerIdx];
                const finalPosition = (menus.length * 10 + winnerIdx) * ITEM_HEIGHT;
                reelsEl.style.transition = 'transform 3.5s cubic-bezier(0.1, 0, 0.1, 1)';
                reelsEl.style.transform = `translateY(-${finalPosition}px)`;

                setTimeout(() => {
                    document.getElementById('winnerName').innerText = winnerName;
                    document.getElementById('resultModal').style.display = 'flex';
                    playSound('win');
                    isRunning = false;
                    btn.classList.remove('disabled');
                    btn.innerText = 'SPIN';
                    slotWindow.classList.remove('active');
                    setTimeout(() => {
                        reelsEl.style.transition = 'none';
                        reelsEl.style.transform = `translateY(-${winnerIdx * ITEM_HEIGHT}px)`;
                    }, 100);
                }, 3500);
            }, 1800);
        }

        function addMenu() {
            const input = document.getElementById('menuInput');
            if (input.value.trim()) {
                menus.unshift(input.value.trim());
                input.value = '';
                renderList(); renderReels();
            }
        }

        function deleteMenu(index) {
            if (menus.length <= 2) return alert('최소 2개의 메뉴는 있어야 합니다.');
            menus.splice(index, 1);
            renderList(); renderReels();
        }

        function closeModal() { document.getElementById('resultModal').style.display = 'none'; }
        function openUpdateModal() { document.getElementById('updateModal').style.display = 'flex'; }
        function closeUpdateModal() { document.getElementById('updateModal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
