<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메뉴 슬롯머신</title>
    <style>
        :root {
            --accent: #007AFF; /* iOS Blue */
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
            --secondary-text: #8E8E93;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 상단 헤더 및 업데이트 버튼 */
        .header {
            width: 100%; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .update-btn {
            font-size: 12px; color: var(--accent); border: 1px solid var(--accent);
            padding: 4px 10px; border-radius: 20px; cursor: pointer;
        }

        /* 🎰 슬롯머신 메인 UI */
        .slot-machine {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
        }

        .slot-window {
            width: 80%; max-width: 320px; height: 120px;
            background: var(--card); border-radius: 24px;
            position: relative; overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .reels {
            position: absolute; width: 100%; top: 0; left: 0;
            display: flex; flex-direction: column;
        }

        .reel-item {
            height: 120px; line-height: 120px; text-align: center;
            font-size: 32px; font-weight: 800; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* 🕹️ 컨트롤 버튼 */
        .controls { margin: 30px 0; }
        .spin-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--accent); color: white; border: none;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,122,255,0.4);
            transition: transform 0.1s, background 0.3s;
        }
        .spin-btn:active { transform: scale(0.9); }
        .spin-btn.disabled { background: #333; box-shadow: none; color: #666; }

        /* 📋 메뉴 관리 하단 시트 */
        .menu-sheet {
            width: 100%; height: 40%; background: var(--card);
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 24px; box-sizing: border-box; overflow-y: auto;
        }

        .input-group {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .input-group input {
            flex: 1; background: #2C2C2E; border: none; border-radius: 12px;
            padding: 12px; color: white; font-size: 16px; outline: none;
        }
        .input-group button {
            background: #3A3A3C; color: white; border: none; 
            padding: 0 20px; border-radius: 12px; font-weight: bold;
        }

        .menu-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #2C2C2E;
        }
        .menu-name { font-size: 17px; font-weight: 500; }
        .menu-prob { font-size: 13px; color: var(--secondary-text); margin-left: 8px; }
        .delete-icon { color: #FF453A; font-size: 20px; cursor: pointer; padding: 5px; }

        /* 🎁 팝업 모달 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #2C2C2E; padding: 40px 20px; border-radius: 24px;
            text-align: center; width: 80%; max-width: 300px;
        }
        .modal-result { font-size: 36px; font-weight: 800; margin: 20px 0; color: var(--accent); }
        .modal-close { 
            background: var(--accent); color: white; border: none; 
            padding: 12px 40px; border-radius: 12px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; font-size: 18px;">오늘 뭐 먹지?</div>
        <div class="update-btn" onclick="alert('v1.5: 기기 자동 저장 기능 & 깔끔한 인터페이스')">Update Ver 1.5</div>
    </div>

    <div class="slot-machine">
        <div class="slot-window">
            <div id="reels" class="reels"></div>
        </div>
        <div class="controls">
            <button id="spinBtn" class="spin-btn" onclick="handleSpin()">GO</button>
        </div>
    </div>

    <div class="menu-sheet">
        <div class="input-group">
            <input type="text" id="menuInput" placeholder="메뉴를 추가하세요" maxlength="12">
            <button onclick="addMenu()">추가</button>
        </div>
        <div id="menuList"></div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div style="color: var(--secondary-text); font-size: 14px;">결정된 오늘의 메뉴!</div>
            <div id="winnerName" class="modal-result"></div>
            <button class="modal-close" onclick="closeModal()">좋아요!</button>
        </div>
    </div>

    <script>
        // 💾 로컬 저장소 키값
        const STORAGE_KEY = 'MY_RANDOM_MENU_LIST';
        
        // 데이터 초기화: 저장된 게 없으면 기본 리스트 사용
        let menus = JSON.parse(localStorage.getItem(STORAGE_KEY)) || ["치킨", "삼겹살", "파스타", "김밥", "국밥"];
        
        const ITEM_HEIGHT = 120;
        let isRunning = false;

        // 1. 초기 실행 및 UI 업데이트
        function init() {
            renderList();
            renderReels();
        }

        // 2. 리스트 그리기 (확률 포함)
        function renderList() {
            const listEl = document.getElementById('menuList');
            listEl.innerHTML = '';
            const prob = (100 / menus.length).toFixed(1);

            menus.forEach((m, i) => {
                const item = document.createElement('div');
                item.className = 'menu-list-item';
                item.innerHTML = `
                    <div>
                        <span class="menu-name">${m}</span>
                        <span class="menu-prob">${prob}%</span>
                    </div>
                    <span class="delete-icon" onclick="deleteMenu(${i})">✕</span>
                `;
                listEl.appendChild(item);
            });
            // 데이터 저장
            localStorage.setItem(STORAGE_KEY, JSON.stringify(menus));
        }

        // 3. 슬롯 릴 구성
        function renderReels() {
            const reelsEl = document.getElementById('reels');
            reelsEl.innerHTML = '';
            // 무한 휠 느낌을 위해 메뉴 10세트 반복
            const displayArr = [];
            for(let i=0; i<10; i++) displayArr.push(...menus);

            displayArr.forEach(m => {
                const div = document.createElement('div');
                div.className = 'reel-item';
                div.innerText = m;
                reelsEl.appendChild(div);
            });
            reelsEl.style.transition = 'none';
            reelsEl.style.transform = `translateY(0)`;
        }

        // 4. 슬롯 시작 및 감속 중지
        function handleSpin() {
            if (isRunning || menus.length < 2) return;
            
            isRunning = true;
            const btn = document.getElementById('spinBtn');
            const reelsEl = document.getElementById('reels');
            btn.classList.add('disabled');
            btn.innerText = '...';

            // 빠르게 회전 시작
            reelsEl.style.transition = 'transform 0.2s linear';
            let loopCount = 0;
            const spinInterval = setInterval(() => {
                loopCount++;
                reelsEl.style.transform = `translateY(-${(loopCount % menus.length) * ITEM_HEIGHT}px)`;
            }, 50);

            // 1.5초 후 멈추기 시작
            setTimeout(() => {
                clearInterval(spinInterval);
                const winnerIdx = Math.floor(Math.random() * menus.length);
                const winnerName = menus[winnerIdx];
                
                // 감속 애니메이션 (마지막 8번째 세트의 당첨 메뉴로 이동)
                const finalPosition = (menus.length * 8 + winnerIdx) * ITEM_HEIGHT;
                reelsEl.style.transition = 'transform 3s cubic-bezier(0.15, 0, 0.15, 1)';
                reelsEl.style.transform = `translateY(-${finalPosition}px)`;

                // 3초 후 결과 출력
                setTimeout(() => {
                    document.getElementById('winnerName').innerText = winnerName;
                    document.getElementById('resultModal').style.display = 'flex';
                    isRunning = false;
                    btn.classList.remove('disabled');
                    btn.innerText = 'GO';
                    
                    // 위치 보정
                    setTimeout(() => {
                        reelsEl.style.transition = 'none';
                        reelsEl.style.transform = `translateY(-${winnerIdx * ITEM_HEIGHT}px)`;
                    }, 100);
                }, 3000);
            }, 1500);
        }

        // 5. 메뉴 추가/삭제
        function addMenu() {
            const input = document.getElementById('menuInput');
            if (input.value.trim()) {
                menus.unshift(input.value.trim());
                input.value = '';
                renderList();
                renderReels();
            }
        }

        function deleteMenu(index) {
            if (menus.length <= 2) return alert('최소 2개의 메뉴는 있어야 합니다.');
            menus.splice(index, 1);
            renderList();
            renderReels();
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
