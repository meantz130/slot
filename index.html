<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프리미엄 메뉴 슬롯 1.0</title>
    <style>
        :root {
            --accent: #FF3B30; /* Neon Red */
            --gold: #FFD700;
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
            --secondary-text: #8E8E93;
            --neon-shadow: 0 0 15px rgba(255, 59, 48, 0.8), 0 0 30px rgba(255, 59, 48, 0.5);
            --gold-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* ✨ 상단 헤더 및 화려한 업데이트 버튼 */
        .header {
            width: 100%; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center; box-sizing: border-box;
            border-bottom: 1px solid #333;
        }
        .app-title { font-weight: 900; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .update-btn {
            font-size: 12px; color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 12px; border-radius: 20px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
            transition: all 0.3s;
        }
        .update-btn:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(255,215,0,0.3); }

        /* 🎰 슬롯머신 메인 UI (화려함 강화) */
        .slot-machine {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 70%);
        }

        .slot-window {
            width: 85%; max-width: 340px; height: 140px;
            background: #000; border-radius: 24px;
            position: relative; overflow: hidden;
            border: 4px solid #333;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.8);
        }
        /* 네온 테두리 효과 (실행 중일 때 변함) */
        .slot-window.active {
            border-color: var(--accent);
            box-shadow: inset 0 0 20px rgba(255,59,48,0.2), var(--neon-shadow);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .reels {
            position: absolute; width: 100%; top: 0; left: 0;
            display: flex; flex-direction: column;
        }

        .reel-item {
            height: 140px; line-height: 140px; text-align: center;
            font-size: 36px; font-weight: 900; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .slot-window.active .reel-item {
            color: var(--accent);
            text-shadow: var(--neon-shadow);
        }

        /* 🕹️ 컨트롤 버튼 (화려함 강화) */
        .controls { margin: 30px 0; }
        .spin-btn {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(145deg, #ff453a, #b01c15);
            color: white; border: 4px solid #fff;
            font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,59,48,0.5), 0 0 0 0px rgba(255,255,255,0.2);
            transition: all 0.1s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .spin-btn:active { 
            transform: scale(0.9) translateY(4px); 
            box-shadow: 0 5px 10px rgba(255,59,48,0.5);
        }
        .spin-btn.disabled { 
            background: #333; border-color: #555; color: #666; 
            box-shadow: none; text-shadow: none;
        }

        /* 📋 메뉴 관리 하단 시트 (깔끔함 유지) */
        .menu-sheet {
            width: 100%; height: 35%; background: var(--card);
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 20px 24px; box-sizing: border-box; 
            display: flex; flex-direction: column;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .input-group input {
            flex: 1; background: #2C2C2E; border: 1px solid #3a3a3c; border-radius: 12px;
            padding: 12px; color: white; font-size: 16px; outline: none;
        }
        .input-group button {
            background: #3A3A3C; color: var(--gold); border: none; 
            padding: 0 20px; border-radius: 12px; font-weight: bold; font-size: 15px;
        }

        .menu-list-container {
            flex: 1; overflow-y: auto;
        }
        .menu-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #2C2C2E;
        }
        .menu-name { font-size: 17px; font-weight: 500; }
        .menu-prob { font-size: 13px; color: var(--secondary-text); margin-left: 8px; }
        .delete-icon { color: #FF453A; font-size: 20px; cursor: pointer; padding: 5px; }

        /* 🎁 팝업 모달 (폭발적인 화려함) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: linear-gradient(145deg, #2c2c2e, #1a1a1a);
            padding: 50px 20px; border-radius: 30px;
            text-align: center; width: 85%; max-width: 320px;
            border: 3px solid var(--gold);
            box-shadow: var(--gold-shadow);
            animation: modalPop 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: relative;
        }
        @keyframes modalPop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* 폭죽 효과 대용 박스 쉐도우 애니메이션 */
        .modal-content::before {
            content: ''; position: absolute; top: -50px; left: -50px; right: -50px; bottom: -50px;
            z-index: -1; border-radius: 40px;
            box-shadow: 0 0 60px 20px rgba(255,215,0,0.3);
            animation: firework 1s ease-out infinite alternate;
        }
        @keyframes firework {
            0% { box-shadow: 0 0 40px 10px rgba(255,215,0,0.2); }
            100% { box-shadow: 0 0 80px 30px rgba(255,215,0,0.5); }
        }

        .modal-header { color: var(--secondary-text); font-size: 16px; font-weight: bold; letter-spacing: 2px; }
        .modal-result { 
            font-size: 48px; font-weight: 900; margin: 25px 0; 
            color: var(--gold); text-shadow: var(--gold-shadow);
            animation: textPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes textPulse {
            0% { transform: scale(1); text-shadow: var(--gold-shadow); }
            100% { transform: scale(1.1); text-shadow: 0 0 30px rgba(255,215,0,1), 0 0 60px rgba(255,215,0,0.7); }
        }
        .modal-close { 
            background: var(--gold); color: black; border: none; 
            padding: 14px 50px; border-radius: 15px; font-weight: 900; font-size: 18px;
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
            transition: all 0.2s;
        }
        .modal-close:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(255,215,0,0.3); }

        /* 📝 업데이트 내역 수정 모달 */
        .update-modal-content {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 90%; max-width: 340px; border: 1px solid #333;
        }
        .update-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .update-header h3 { margin: 0; color: var(--gold); }
        .save-update-btn { background: var(--gold); color: black; border: none; padding: 6px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #updateTextarea {
            width: 100%; height: 200px; background: #2C2C2E; color: white;
            border: 1px solid #3a3a3c; border-radius: 10px; padding: 10px;
            box-sizing: border-box; font-family: inherit; font-size: 14px;
            line-height: 1.6; resize: none; outline: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="app-title">LUCKY MENU</div>
        <div class="update-btn" onclick="openUpdateModal()">Ver 1.0</div>
    </div>

    <div class="slot-machine">
        <div id="slotWindow" class="slot-window">
            <div id="reels" class="reels"></div>
        </div>
        <div class="controls">
            <button id="spinBtn" class="spin-btn" onclick="handleSpin()">SPIN</button>
        </div>
    </div>

    <div class="menu-sheet">
        <div class="input-group">
            <input type="text" id="menuInput" placeholder="새 메뉴 추가..." maxlength="12">
            <button onclick="addMenu()">추가</button>
        </div>
        <div class="menu-list-container">
            <div id="menuList"></div>
        </div>
    </div>

    <div id="resultModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">TODAY'S LUNCH</div>
            <div id="winnerName" class="modal-result"></div>
            <button class="modal-close" onclick="closeModal()">JACKPOT!</button>
        </div>
    </div>

    <div id="updateModal" class="modal" onclick="closeUpdateModal()">
        <div class="update-modal-content" onclick="event.stopPropagation()">
            <div class="update-header">
                <h3>Update Notes</h3>
                <button class="save-update-btn" onclick="saveUpdateNotes()">저장</button>
            </div>
            <textarea id="updateTextarea" placeholder="업데이트 내용을 작성하세요..."></textarea>
            <div style="font-size: 11px; color: #666; margin-top: 10px; text-align: center;">내용을 수정하고 저장하면 기기에 저장됩니다.</div>
        </div>
    </div>

    <script>
        // 💾 로컬 저장소 키값
        const MENU_KEY = 'MY_RANDOM_MENU_LIST_V1';
        const UPDATE_KEY = 'MY_SLOT_UPDATE_NOTES_V1';
        
        // 초기 데이터 로드
        let menus = JSON.parse(localStorage.getItem(MENU_KEY)) || ["치킨", "삼겹살", "파스타", "김밥", "국밥", "초밥", "햄버거"];
        const defaultUpdateNotes = "• Ver 1.0 출시!\n• 화려한 네온 슬롯 머신 효과 적용\n• 당첨 시 잭팟 팝업 애니메이션 추가\n• 기기 내 메뉴 자동 저장 기능\n• 앱 내 업데이트 내역 수정 기능 추가";

        const ITEM_HEIGHT = 140; // reel-item 높이와 일치해야 함
        let isRunning = false;

        // 1. 초기 실행 및 UI 업데이트
        function init() {
            renderList();
            renderReels();
        }

        // 2. 리스트 그리기 (확률 포함)
        function renderList() {
            const listEl = document.getElementById('menuList');
            listEl.innerHTML = '';
            const prob = (menus.length > 0) ? (100 / menus.length).toFixed(1) : 0;

            menus.forEach((m, i) => {
                const item = document.createElement('div');
                item.className = 'menu-list-item';
                item.innerHTML = `
                    <div>
                        <span class="menu-name">${m}</span>
                        <span class="menu-prob">${prob}%</span>
                    </div>
                    <span class="delete-icon" onclick="deleteMenu(${i})">✕</span>
                `;
                listEl.appendChild(item);
            });
            // 메뉴 데이터 저장
            localStorage.setItem(MENU_KEY, JSON.stringify(menus));
        }

        // 3. 슬롯 릴 구성 (화려함 표현을 위해 넉넉하게 구성)
        function renderReels() {
            const reelsEl = document.getElementById('reels');
            reelsEl.innerHTML = '';
            // 무한 휠 느낌을 위해 메뉴 12세트 반복
            const displayArr = [];
            for(let i=0; i<12; i++) displayArr.push(...menus);

            displayArr.forEach(m => {
                const div = document.createElement('div');
                div.className = 'reel-item';
                div.innerText = m;
                reelsEl.appendChild(div);
            });
            reelsEl.style.transition = 'none';
            reelsEl.style.transform = `translateY(0)`;
        }

        // 4. 슬롯 시작 및 감속 중지 (화려한 효과 집중)
        function handleSpin() {
            if (isRunning || menus.length < 2) return;
            
            isRunning = true;
            const btn = document.getElementById('spinBtn');
            const reelsEl = document.getElementById('reels');
            const slotWindow = document.getElementById('slotWindow');
            
            // UI 상태 변경 (화려한 효과 시작)
            btn.classList.add('disabled');
            btn.innerText = '!!!';
            slotWindow.classList.add('active');

            // 빠르게 회전 시작
            reelsEl.style.transition = 'transform 0.15s linear';
            let loopCount = 0;
            const spinInterval = setInterval(() => {
                loopCount++;
                reelsEl.style.transform = `translateY(-${(loopCount % menus.length) * ITEM_HEIGHT}px)`;
            }, 50);

            // 1.8초 후 멈추기 시작 (박진감 유지를 위해 약간 김)
            setTimeout(() => {
                clearInterval(spinInterval);
                const winnerIdx = Math.floor(Math.random() * menus.length);
                const winnerName = menus[winnerIdx];
                
                // 감속 애니메이션 (마지막 10번째 세트의 당첨 메뉴로 이동)
                const finalPosition = (menus.length * 10 + winnerIdx) * ITEM_HEIGHT;
                // 아주 부드럽고 쫄깃하게 멈추는 베지어 곡선
                reelsEl.style.transition = 'transform 3.5s cubic-bezier(0.1, 0, 0.1, 1)';
                reelsEl.style.transform = `translateY(-${finalPosition}px)`;

                // 3.5초 후 결과 출력 (애니메이션 완료 시점)
                setTimeout(() => {
                    // 결과 팝업 표시
                    document.getElementById('winnerName').innerText = winnerName;
                    document.getElementById('resultModal').style.display = 'flex';
                    
                    // UI 상태 원복
                    isRunning = false;
                    btn.classList.remove('disabled');
                    btn.innerText = 'SPIN';
                    slotWindow.classList.remove('active');
                    
                    // 위치 보정 (착시 효과)
                    setTimeout(() => {
                        reelsEl.style.transition = 'none';
                        reelsEl.style.transform = `translateY(-${winnerIdx * ITEM_HEIGHT}px)`;
                    }, 100);
                }, 3500);
            }, 1800);
        }

        // 5. 메뉴 추가/삭제
        function addMenu() {
            const input = document.getElementById('menuInput');
            if (input.value.trim()) {
                menus.unshift(input.value.trim()); // 맨 앞에 추가
                input.value = '';
                renderList();
                renderReels();
            }
        }

        function deleteMenu(index) {
            if (menus.length <= 2) return alert('최소 2개의 메뉴는 있어야 합니다.');
            menus.splice(index, 1);
            renderList();
            renderReels();
        }

        // 6. 결과 모달 제어
        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        // 7. 업데이트 내역 모달 제어 및 저장
        function openUpdateModal() {
            const savedNotes = localStorage.getItem(UPDATE_KEY) || defaultUpdateNotes;
            document.getElementById('updateTextarea').value = savedNotes;
            document.getElementById('updateModal').style.display = 'flex';
        }

        function closeUpdateModal() {
            document.getElementById('updateModal').style.display = 'none';
        }

        function saveUpdateNotes() {
            const notes = document.getElementById('updateTextarea').value;
            localStorage.setItem(UPDATE_KEY, notes);
            alert('업데이트 내역이 저장되었습니다.');
            closeUpdateModal();
        }

        // 페이지 시작 시 실행
        init();
    </script>
</body>
</html>
</body>
</html>
